name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: backend

      - name: Go tests (unit)
        run: cd backend && go test -short ./...

      - name: Build Go binary
        run: cd backend && go build ./cmd/server

  integration-test-go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: phaeton
          POSTGRES_PASSWORD: phaeton
          POSTGRES_DB: phaeton_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U phaeton"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Go tests (integration)
        env:
          DATABASE_URL: postgres://phaeton:phaeton@localhost:5432/phaeton_test?sslmode=disable
        run: cd backend && go test -count=1 ./...

  lint-and-test-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript type check
        run: cd frontend && npx tsc --noEmit

      - name: ESLint
        run: cd frontend && npm run lint

      - name: Vitest
        run: cd frontend && npm run test

      - name: Build frontend
        run: cd frontend && npm run build
