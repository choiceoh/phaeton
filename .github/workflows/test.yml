name: test

on:
  pull_request:
  push:
    branches: [main, ostcode/foundation]

jobs:
  backend:
    name: backend (vet + build + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: phaeton
          POSTGRES_PASSWORD: phaeton
          POSTGRES_DB: phaeton_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U phaeton"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://phaeton:phaeton@localhost:5432/phaeton_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: go vet
        run: cd backend && go vet ./...
      - name: go build
        run: cd backend && go build ./...
      - name: go test
        # -p 1 serializes packages so the integration tests don't race on
        # CREATE SCHEMA IF NOT EXISTS (which is not race-safe in PostgreSQL).
        run: cd backend && go test -race -timeout 120s -p 1 ./...

  frontend:
    name: frontend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
      - run: cd frontend && npm test
