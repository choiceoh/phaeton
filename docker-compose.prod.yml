# Blue-Green 무중단 배포용 프로덕션 Compose
# 사용법: scripts/deploy.sh 참고

x-app: &app-common
  build: .
  restart: unless-stopped
  environment:
    DATABASE_URL: postgres://phaeton:${DB_PASSWORD}@db:5432/phaeton
    PAYLOAD_SECRET: ${PAYLOAD_SECRET}
    NEXT_PUBLIC_APP_URL: ${APP_URL:-https://phaeton.example.com}
    VLLM_BASE_URL: ${VLLM_BASE_URL:-http://host.docker.internal:8000}
    VLLM_MODEL: ${VLLM_MODEL:-gemma4}
    NODE_ENV: production
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - uploads:/app/uploads
  depends_on:
    db:
      condition: service_healthy
  healthcheck:
    test:
      [
        "CMD",
        "node",
        "-e",
        "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
      ]
    interval: 10s
    timeout: 5s
    retries: 3
    start_period: 40s
  stop_grace_period: 30s

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: phaeton
      POSTGRES_USER: phaeton
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phaeton"]
      interval: 5s
      retries: 5
      start_period: 10s

  app-blue:
    <<: *app-common

  app-green:
    <<: *app-common

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data

volumes:
  pgdata:
  uploads:
  caddy_data:
