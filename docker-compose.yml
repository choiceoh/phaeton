services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: phaeton
      POSTGRES_PASSWORD: ${DB_PASSWORD:-phaeton}
      POSTGRES_DB: phaeton
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phaeton"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://phaeton:${DB_PASSWORD:-phaeton}@db:5432/phaeton?sslmode=disable
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      JWT_SECRET: ${JWT_SECRET:-phaeton-dev-secret}
      ADDR: ":8080"
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:8000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
    external: true
    name: practical-neumann_pgdata
