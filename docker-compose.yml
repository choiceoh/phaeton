services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: phaeton
      POSTGRES_USER: phaeton
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phaeton"]
      interval: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://phaeton:${DB_PASSWORD}@db:5432/phaeton
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      NODE_ENV: production
    volumes:
      - uploads:/app/uploads
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy

  # Phase 3에서 추가 — 프로덕션 배포 시
