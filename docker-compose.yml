services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: phaeton
      POSTGRES_PASSWORD: phaeton
      POSTGRES_DB: phaeton
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init scripts only run on a *fresh* volume. If the volume already
      # exists, use `make db-test` instead to create phaeton_test.
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phaeton"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
