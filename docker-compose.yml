services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: phaeton
      POSTGRES_PASSWORD: phaeton
      POSTGRES_DB: phaeton
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phaeton"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
